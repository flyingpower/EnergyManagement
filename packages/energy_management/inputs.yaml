# Energy Management System - Input Helpers
# These entities allow user control and configuration of the charging system
# Note: NO `initial:` values are set on user-facing inputs so that Home Assistant
# restores the last-used value after a restart. Use the "Standardwerte" script to reset.

input_number:
  # Morning Readiness Target
  target_soc_morning:
    name: "Ziel-Ladestand Morgen"
    min: 20
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-charging-80

  # Morning Target Hour
  morning_target_hour:
    name: "Morgenziel Uhrzeit"
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "Uhr"
    icon: mdi:clock-outline

  # Manual Charging Target
  manual_target_soc:
    name: "Manueller Ziel-Ladestand"
    min: 20
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-charging

  # Price Thresholds
  price_threshold_50:
    name: "Preisschwelle für 50% Ladung"
    min: 0.10
    max: 0.50
    step: 0.01
    unit_of_measurement: "EUR/kWh"
    icon: mdi:currency-eur

  price_threshold_80:
    name: "Preisschwelle für 80% Ladung"
    min: 0.10
    max: 0.50
    step: 0.01
    unit_of_measurement: "EUR/kWh"
    icon: mdi:currency-eur

  # Minimum PV Surplus
  min_pv_surplus:
    name: "Minimaler PV-Überschuss"
    min: 500
    max: 3000
    step: 100
    unit_of_measurement: "W"
    icon: mdi:solar-power

  # PV Charging Buffer
  pv_charging_buffer:
    name: "PV Lade-Puffer"
    min: 0
    max: 500
    step: 50
    unit_of_measurement: "W"
    icon: mdi:buffer

  # Check Interval (UI label only — actual timer logic uses pv_start/stop_condition_timer)
  pv_hysteresis_time:
    name: "PV Prüfintervall"
    min: 1
    max: 10
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-sand

  # Manual current override: 0 = auto (calculated), 6-32 = force this amperage
  override_charging_current:
    name: "Ladestrom Überschreiben (0=Auto)"
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:current-ac

input_boolean:
  # Manual Charging Mode Toggle
  manual_charging_mode:
    name: "Manueller Lademodus"
    icon: mdi:car-electric

  # Enable/Disable PV Charging
  enable_pv_charging:
    name: "PV-Laden aktiviert"
    icon: mdi:solar-power

  # Enable/Disable Price-Based Charging
  enable_price_charging:
    name: "Preisbasiertes Laden aktiviert"
    icon: mdi:currency-eur

  # Enable Morning Readiness Check
  enable_morning_readiness:
    name: "Morgen-Bereitschaft aktiviert"
    icon: mdi:alarm

input_datetime:
  # Manual Charging Deadline
  manual_deadline:
    name: "Manuelles Ladeziel-Zeitpunkt"
    has_date: true
    has_time: true
    icon: mdi:clock-end

input_select:
  # Charging State Machine
  charging_state:
    name: "Ladezustand"
    options:
      - "idle"
      - "pv"
      - "price"
      - "manual"
      - "emergency"
      - "morning_readiness"
    icon: mdi:state-machine

  # Phase mode override: auto = let the mode decide, 1_phase / 3_phase = force
  override_phase_mode:
    name: "Phasenmodus Überschreiben"
    options:
      - "auto"
      - "1_phase"
      - "3_phase"
    icon: mdi:sine-wave

  # Charging Control Method
  charging_control_method:
    name: "Ladesteuerung"
    options:
      - "tesla"
      - "easee"
    icon: mdi:cog
