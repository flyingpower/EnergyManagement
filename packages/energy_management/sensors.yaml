# Energy Management System - Template Sensors
# These sensors calculate values and provide status information

template:
  - sensor:
      # Current Charging Mode Display
      - name: "Aktueller Lademodus"
        unique_id: energy_mgmt_charging_mode
        state: >
          {% if is_state('input_boolean.manual_charging_mode', 'on') %}
            Manuell
          {% elif is_state('input_select.charging_state', 'emergency') %}
            Notladung
          {% elif is_state('input_select.charging_state', 'morning_readiness') %}
            Morgen-Bereitschaft
          {% elif is_state('input_select.charging_state', 'pv') %}
            PV-Überschuss
          {% elif is_state('input_select.charging_state', 'price') %}
            Preisbasiert
          {% else %}
            Inaktiv
          {% endif %}
        icon: >
          {% if is_state('input_boolean.manual_charging_mode', 'on') %}
            mdi:hand-back-right
          {% elif is_state('input_select.charging_state', 'emergency') %}
            mdi:alert
          {% elif is_state('input_select.charging_state', 'morning_readiness') %}
            mdi:alarm
          {% elif is_state('input_select.charging_state', 'pv') %}
            mdi:solar-power
          {% elif is_state('input_select.charging_state', 'price') %}
            mdi:currency-eur
          {% else %}
            mdi:power-sleep
          {% endif %}

      # PV Surplus Available for Charging
      - name: "Verfügbarer PV-Überschuss"
        unique_id: energy_mgmt_available_pv_surplus
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set power_consumption = states('sensor.tibber_power') | float(0) %}
          {% set power_production = states('sensor.tibber_power_production') | float(0) %}
          {% set net_consumption = power_consumption - power_production %}
          {% set buffer = states('input_number.pv_charging_buffer') | float(200) %}
          {% if net_consumption < 0 %}
            {% set surplus = (net_consumption | abs - buffer) | round(0) %}
            {{ [surplus, 0] | max }}
          {% else %}
            0
          {% endif %}

      # Calculated Charging Current from PV Surplus
      - name: "Berechneter Ladestrom (PV)"
        unique_id: energy_mgmt_calculated_pv_current
        unit_of_measurement: "A"
        state: >
          {% set surplus = states('sensor.verfugbarer_pv_uberschuss') | float(0) %}
          {% set voltage = 230 %}
          {% set phases = 1 %}
          {% if surplus > 0 %}
            {% set current = (surplus / (phases * voltage)) | round(0) | int %}
            {{ [[current, 6] | max, 32] | min }}
          {% else %}
            0
          {% endif %}

      # Current Tibber Price
      - name: "Aktueller Strompreis"
        unique_id: energy_mgmt_current_price
        unit_of_measurement: "EUR/kWh"
        state: >
          {{ states('sensor.tibber_electricity_price') | float(0) | round(4) }}
        icon: mdi:currency-eur

      # ============================================================================
      # TESLA SENSORS
      # ============================================================================

      # Tesla SOC — sourced from Tibber (sensor.model_3_state_of_charge)
      # Tesla integration is currently broken; Tibber provides SoC via car integration
      - name: "Tesla Ladestand"
        unique_id: energy_mgmt_tesla_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set current = states('sensor.model_3_state_of_charge') %}
          {% if current in ['unavailable', 'unknown', 'none'] or current | float(0) <= 0 %}
            {{ states('input_number.tesla_soc_last_valid') | float(50) | round(0) }}
          {% else %}
            {{ current | float(0) | round(0) }}
          {% endif %}
        icon: >
          {% set current = states('sensor.model_3_state_of_charge') %}
          {% if current in ['unavailable', 'unknown', 'none'] or current | float(0) <= 0 %}
            mdi:battery-alert
          {% else %}
            mdi:battery-charging
          {% endif %}
        attributes:
          source: >
            {% set current = states('sensor.model_3_state_of_charge') %}
            {% if current in ['unavailable', 'unknown', 'none'] or current | float(0) <= 0 %}
              last_valid
            {% else %}
              live
            {% endif %}
          last_valid_soc: "{{ states('input_number.tesla_soc_last_valid') | float(0) | round(0) }}"
          raw_soc: "{{ states('sensor.model_3_state_of_charge') }}"

      # Tesla Charging Status
      - name: "Tesla Ladestatus"
        unique_id: energy_mgmt_tesla_charging_status
        state: >
          {% set status = states('sensor.model_3_charging') %}
          {% if status == 'Charging' %}
            Lädt
          {% elif status == 'Complete' %}
            Vollständig
          {% elif status == 'Stopped' %}
            Gestoppt
          {% elif status == 'Disconnected' %}
            Nicht verbunden
          {% else %}
            {{ status }}
          {% endif %}
        icon: >
          {% set status = states('sensor.model_3_charging') %}
          {% if status == 'Charging' %}
            mdi:battery-charging
          {% elif status == 'Complete' %}
            mdi:battery-check
          {% elif status == 'Disconnected' %}
            mdi:power-plug-off
          {% else %}
            mdi:battery
          {% endif %}

      # ============================================================================
      # KIA EV3 SENSORS
      # ============================================================================

      # Kia EV3 SOC (with staleness fallback: if last update > 24h, use 30%)
      - name: "Kia Ladestand"
        unique_id: energy_mgmt_kia_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set current = states('sensor.ev3_ev_battery_level') %}
          {% set last_changed = states.sensor.ev3_ev_battery_level.last_changed if states.sensor.ev3_ev_battery_level is defined else none %}
          {% set stale = (last_changed is none) or (now() - last_changed).total_seconds() > 86400 %}
          {% if current in ['unavailable', 'unknown', 'none'] or stale %}
            30
          {% else %}
            {{ current | float(0) | round(0) }}
          {% endif %}
        icon: >
          {% set current = states('sensor.ev3_ev_battery_level') %}
          {% set last_changed = states.sensor.ev3_ev_battery_level.last_changed if states.sensor.ev3_ev_battery_level is defined else none %}
          {% set stale = (last_changed is none) or (now() - last_changed).total_seconds() > 86400 %}
          {% if current in ['unavailable', 'unknown', 'none'] or stale %}
            mdi:battery-alert
          {% else %}
            mdi:battery-charging
          {% endif %}
        attributes:
          source: >
            {% set current = states('sensor.ev3_ev_battery_level') %}
            {% set last_changed = states.sensor.ev3_ev_battery_level.last_changed if states.sensor.ev3_ev_battery_level is defined else none %}
            {% set stale = (last_changed is none) or (now() - last_changed).total_seconds() > 86400 %}
            {% if current in ['unavailable', 'unknown', 'none'] %}
              unavailable
            {% elif stale %}
              stale_fallback
            {% else %}
              live
            {% endif %}
          raw_soc: "{{ states('sensor.ev3_ev_battery_level') }}"
          last_changed: >
            {% set last_changed = states.sensor.ev3_ev_battery_level.last_changed if states.sensor.ev3_ev_battery_level is defined else none %}
            {{ last_changed.isoformat() if last_changed else 'unknown' }}

      # Kia EV3 Charging Status
      - name: "Kia Ladestatus"
        unique_id: energy_mgmt_kia_charging_status
        state: >
          {% set charging = is_state('binary_sensor.ev3_ev_battery_charge', 'on') %}
          {% set plugged = is_state('binary_sensor.ev3_ev_battery_plug', 'on') %}
          {% if charging %}
            Lädt
          {% elif plugged %}
            Verbunden
          {% else %}
            Nicht verbunden
          {% endif %}
        icon: >
          {% if is_state('binary_sensor.ev3_ev_battery_charge', 'on') %}
            mdi:battery-charging
          {% elif is_state('binary_sensor.ev3_ev_battery_plug', 'on') %}
            mdi:power-plug
          {% else %}
            mdi:power-plug-off
          {% endif %}

      # ============================================================================
      # ACTIVE CAR DETECTION
      # Determines which car is currently plugged into the Easee charger.
      # Priority: (1) Tesla plugged in per Easee, (2) Kia plug sensor says plugged in,
      # (3) fallback to car with oldest/stale SoC timestamp (needs charging more urgently)
      # ============================================================================

      - name: "Aktives Auto"
        unique_id: energy_mgmt_active_car
        state: >
          {% set easee_connected = not is_state('sensor.garage_status', 'disconnected') %}
          {% set tesla_plug = states('sensor.model_3_charging') %}
          {% set kia_plugged = is_state('binary_sensor.ev3_ev_battery_plug', 'on') %}

          {# Tesla is considered plugged in if Easee is active AND Tesla is not reporting Disconnected #}
          {% set tesla_plugged = easee_connected and tesla_plug not in ['Disconnected', 'unavailable', 'unknown'] %}

          {% if tesla_plugged %}
            Tesla Model 3
          {% elif kia_plugged %}
            Kia EV3
          {% else %}
            {# Fallback: pick car with older/staler SoC timestamp #}
            {% set tesla_changed = states.sensor.model_3_battery_level.last_changed if states.sensor.model_3_battery_level is defined else none %}
            {% set kia_changed = states.sensor.ev3_ev_battery_level.last_changed if states.sensor.ev3_ev_battery_level is defined else none %}
            {% set tesla_invalid = states('sensor.model_3_battery_level') in ['unavailable', 'unknown', 'none'] %}
            {% set kia_invalid = states('sensor.ev3_ev_battery_level') in ['unavailable', 'unknown', 'none'] %}
            {% if tesla_invalid and not kia_invalid %}
              Tesla Model 3
            {% elif kia_invalid and not tesla_invalid %}
              Kia EV3
            {% elif tesla_changed is none %}
              Tesla Model 3
            {% elif kia_changed is none %}
              Kia EV3
            {% elif tesla_changed <= kia_changed %}
              Tesla Model 3
            {% else %}
              Kia EV3
            {% endif %}
          {% endif %}
        icon: >
          {% if states('sensor.aktives_auto') == 'Kia EV3' %}
            mdi:car-electric
          {% else %}
            mdi:car-electric-outline
          {% endif %}
        attributes:
          detection_method: >
            {% set easee_connected = not is_state('sensor.garage_status', 'disconnected') %}
            {% set tesla_plug = states('sensor.model_3_charging') %}
            {% set kia_plugged = is_state('binary_sensor.ev3_ev_battery_plug', 'on') %}
            {% set tesla_plugged = easee_connected and tesla_plug not in ['Disconnected', 'unavailable', 'unknown'] %}
            {% if tesla_plugged %}
              plug_state_tesla
            {% elif kia_plugged %}
              plug_state_kia
            {% else %}
              fallback_timestamp
            {% endif %}
          active_soc: >
            {% if states('sensor.aktives_auto') == 'Kia EV3' %}
              {{ states('sensor.kia_ladestand') }}
            {% else %}
              {{ states('sensor.tesla_ladestand') }}
            {% endif %}

      # Active car SoC — single entity used by all charging logic
      - name: "Aktives Auto Ladestand"
        unique_id: energy_mgmt_active_car_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% if states('sensor.aktives_auto') == 'Kia EV3' %}
            {{ states('sensor.kia_ladestand') | float(30) | round(0) }}
          {% else %}
            {{ states('sensor.tesla_ladestand') | float(30) | round(0) }}
          {% endif %}
        icon: mdi:battery-charging

      # ============================================================================
      # CHARGER / GRID SENSORS
      # ============================================================================

      # Car Connected Sensor (for templates that reference sensor.auto_angeschlossen)
      - name: "Auto Angeschlossen"
        unique_id: energy_mgmt_car_connected_sensor
        state: >
          {{ not is_state('sensor.garage_status', 'disconnected') }}
        icon: >
          {% if not is_state('sensor.garage_status', 'disconnected') %}
            mdi:car-electric
          {% else %}
            mdi:car-off
          {% endif %}

      # Should PV Charging Be Active
      - name: "PV-Laden Sollzustand"
        unique_id: energy_mgmt_pv_should_charge
        state: >
          {% set surplus = states('sensor.verfugbarer_pv_uberschuss') | float(0) %}
          {% set min_surplus = states('input_number.min_pv_surplus') | float(1400) %}
          {% set car_connected = is_state('binary_sensor.auto_angeschlossen', 'on') %}
          {% set pv_enabled = is_state('input_boolean.enable_pv_charging', 'on') %}
          {% set manual_mode = is_state('input_boolean.manual_charging_mode', 'on') %}
          {{ car_connected and pv_enabled and not manual_mode and surplus >= min_surplus }}

      # Easee Charger Status
      - name: "Easee Ladegerät Status"
        unique_id: energy_mgmt_easee_status
        state: >
          {% set status = states('sensor.garage_status') %}
          {% if status == 'ready' %}
            Bereit
          {% elif status == 'charging' %}
            Lädt
          {% elif status == 'completed' or status == 'Completed' %}
            Abgeschlossen
          {% elif status == 'error' %}
            Fehler
          {% else %}
            {{ status }}
          {% endif %}
        icon: mdi:ev-station

      # Current Charging Power
      - name: "Aktuelle Ladeleistung"
        unique_id: energy_mgmt_current_charging_power
        unit_of_measurement: "W"
        device_class: power
        state: >
          {{ (states('sensor.garage_power') | float(0) * 1000) | round(0) }}
        icon: mdi:lightning-bolt

      # Estimated kWh Needed to Target (uses active car SoC and capacity)
      - name: "Benötigte Energie bis Ziel"
        unique_id: energy_mgmt_kwh_needed
        unit_of_measurement: "kWh"
        state: >
          {% set current_soc = states('sensor.aktives_auto_ladestand') | float(0) %}
          {% set target_soc = states('input_number.target_soc_morning') | float(80) %}
          {% set battery_capacity = 58 if states('sensor.aktives_auto') == 'Kia EV3' else 75 %}
          {% set efficiency_loss = 1.15 %}
          {% if target_soc > current_soc %}
            {{ (((target_soc - current_soc) / 100 * battery_capacity) * efficiency_loss) | round(2) }}
          {% else %}
            0
          {% endif %}

      # Estimated Hours Needed to Charge
      - name: "Geschätzte Ladedauer"
        unique_id: energy_mgmt_hours_needed
        unit_of_measurement: "h"
        state: >
          {% set kwh_needed = states('sensor.benotigte_energie_bis_ziel') | float(0) %}
          {% set charger_power = 7.4 %}
          {% if kwh_needed > 0 %}
            {{ (kwh_needed / charger_power) | round(1) }}
          {% else %}
            0
          {% endif %}

      # Price Level Indicator
      - name: "Preisniveau"
        unique_id: energy_mgmt_price_level
        state: >
          {% set price = states('sensor.aktueller_strompreis') | float(0) %}
          {% set threshold_50 = states('input_number.price_threshold_50') | float(0.30) %}
          {% set threshold_80 = states('input_number.price_threshold_80') | float(0.28) %}
          {% if price <= threshold_80 %}
            Sehr günstig
          {% elif price <= threshold_50 %}
            Günstig
          {% elif price <= 0.35 %}
            Normal
          {% elif price <= 0.45 %}
            Teuer
          {% else %}
            Sehr teuer
          {% endif %}
        icon: >
          {% set price = states('sensor.aktueller_strompreis') | float(0) %}
          {% set threshold_80 = states('input_number.price_threshold_80') | float(0.28) %}
          {% if price <= threshold_80 %}
            mdi:arrow-down-bold
          {% else %}
            mdi:arrow-up-bold
          {% endif %}

  - binary_sensor:
      # Car Connected Binary Sensor
      - name: "Auto Angeschlossen"
        unique_id: energy_mgmt_car_connected_binary
        state: >
          {{ not is_state('sensor.garage_status', 'disconnected') }}
        device_class: plug
        icon: >
          {% if not is_state('sensor.garage_status', 'disconnected') %}
            mdi:power-plug
          {% else %}
            mdi:power-plug-off
          {% endif %}

      # Emergency Charging Needed (based on active car)
      - name: "Notladung Erforderlich"
        unique_id: energy_mgmt_emergency_needed
        state: >
          {% set soc = states('sensor.aktives_auto_ladestand') | float(100) %}
          {% set active_car = states('sensor.aktives_auto') %}
          {# For Tesla check source attribute; for Kia check that it's not stale fallback #}
          {% if active_car == 'Tesla Model 3' %}
            {% set source = state_attr('sensor.tesla_ladestand', 'source') %}
            {{ soc > 0 and soc < 20 and source == 'live' }}
          {% else %}
            {% set source = state_attr('sensor.kia_ladestand', 'source') %}
            {{ soc > 0 and soc < 20 and source == 'live' }}
          {% endif %}
        device_class: problem
        icon: >
          {% if is_state('binary_sensor.notladung_erforderlich', 'on') %}
            mdi:alert-circle
          {% else %}
            mdi:check-circle
          {% endif %}

      # Morning Target Will Be Met
      - name: "Morgenziel Erreichbar"
        unique_id: energy_mgmt_morning_target_reachable
        state: >
          {% set current_soc = states('sensor.aktives_auto_ladestand') | float(0) %}
          {% set target_soc = states('input_number.target_soc_morning') | float(80) %}
          {% set hours_until_7am = 12 %}
          {% set hours_needed = states('sensor.geschatzte_ladedauer') | float(0) %}
          {{ hours_until_7am >= hours_needed or current_soc >= target_soc }}
        icon: >
          {% if is_state('binary_sensor.morgenziel_erreichbar', 'on') %}
            mdi:check-circle-outline
          {% else %}
            mdi:alert-circle-outline
          {% endif %}
