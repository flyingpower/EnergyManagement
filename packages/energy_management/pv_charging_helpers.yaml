# PV Charging Helper Inputs
# Time-based stability tracking for start/stop conditions

input_number:
  # Track how long start condition has been met (in seconds)
  pv_start_condition_timer:
    name: "PV Start Condition Timer"
    min: 0
    max: 600
    step: 1
    unit_of_measurement: "s"
    icon: mdi:timer-sand

  # Track how long stop condition has been met (in seconds)
  pv_stop_condition_timer:
    name: "PV Stop Condition Timer"
    min: 0
    max: 600
    step: 1
    unit_of_measurement: "s"
    icon: mdi:timer-sand

template:
  - sensor:
      # Calculate target charging current to achieve ~0W net consumption
      # Uses grid-meter model: tibber_power = grid import, tibber_power_production = grid export
      - name: "PV Target Charging Current"
        unique_id: pv_target_charging_current
        unit_of_measurement: "A"
        state: >
          {% set consumption = states('sensor.tibber_power') | float(0) %}
          {% set production = states('sensor.tibber_power_production') | float(0) %}
          {% set buffer = states('input_number.pv_charging_buffer') | float(200) %}
          {# garage_power is in kW — convert to W #}
          {% set current_charging_w = states('sensor.garage_power') | float(0) * 1000 %}
          {% set current_limit = states('sensor.garage_dynamic_charger_limit') | int(6) %}

          {# Check for current override — if set, use that directly #}
          {% set override = states('input_number.override_charging_current') | int(0) %}
          {% if override >= 6 %}
            {{ override }}
          {% else %}
            {# net = grid import - grid export (negative = exporting) #}
            {% set net = consumption - production %}
            {# Available power for charger = current charger draw + current export - buffer #}
            {% set available_for_charger = current_charging_w - net - buffer %}

            {# Convert to amps: 1-phase 230V #}
            {% set target_current = (available_for_charger / 230) | round(0) | int %}

            {# Clamp to 6–32A #}
            {% set target_current = [[target_current, 6] | max, 32] | min %}

            {# Step toward target by max 2A per cycle to avoid overshoot due to
               Tibber's 30s polling lag. This gives smoother convergence. #}
            {% if target_current > current_limit + 2 %}
              {{ current_limit + 2 }}
            {% elif target_current < current_limit - 2 %}
              {{ current_limit - 2 }}
            {% else %}
              {{ target_current }}
            {% endif %}
          {% endif %}

      # Net grid consumption (positive = importing, negative = exporting)
      - name: "Net Grid Consumption"
        unique_id: net_grid_consumption
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set consumption = states('sensor.tibber_power') | float(0) %}
          {% set production = states('sensor.tibber_power_production') | float(0) %}
          {{ (consumption - production) | round(0) }}
