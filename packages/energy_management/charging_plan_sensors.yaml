# Charging Plan Visualization Sensors
# These sensors calculate and display the charging plan forecast

template:
  - trigger:
      - platform: event
        event_type: tibber_prices_updated
    sensor:
      - name: "Tibber Preisprognose"
        unique_id: tibber_price_forecast
        state: "{{ now().isoformat() }}"
        attributes:
          prices_today: >
            {% if trigger.event.data.prices is defined %}
              {% set prices_dict = trigger.event.data.prices %}
              {% set home_key = prices_dict.keys() | list | first %}
              {% set home_prices = prices_dict[home_key] %}
              {# Aggregate 15-min slots into hourly entries by taking the first slot per hour #}
              {# (Tibber 15-min prices within an hour are very close, first slot is representative) #}
              {% set ns = namespace(result=[], seen_hours=[]) %}
              {% for price in home_prices %}
                {% set dt = price.start_time | as_datetime | as_local %}
                {% set hour_key = dt.strftime('%Y-%m-%dT%H') %}
                {% if hour_key not in ns.seen_hours %}
                  {% set ns.seen_hours = ns.seen_hours + [hour_key] %}
                  {% set ns.result = ns.result + [{
                    'startsAt': dt.replace(minute=0, second=0, microsecond=0).isoformat(),
                    'total': price.price | float,
                    'level': ''
                  }] %}
                {% endif %}
              {% endfor %}
              {{ ns.result }}
            {% else %}
              {{ this.attributes.get('prices_today', []) }}
            {% endif %}
          prices_tomorrow: "{{ [] }}"
          last_update: "{{ now().isoformat() }}"
