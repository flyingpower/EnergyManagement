# Energy Management System - Automations
# Main charging control logic

automation:
  # ============================================================================
  # CENTRAL CHARGING CONTROLLER
  # Evaluates all scenarios every 5 minutes and determines active mode
  # ============================================================================

  - id: energy_mgmt_central_controller
    alias: "Energie Management - Zentralsteuerung"
    description: "Hauptsteuerung für alle Ladeszenarien mit Prioritätsverwaltung"
    trigger:
      - platform: time_pattern
        minutes: "/1"  # Every 1 minute - change to "/2" or "/5" for slower response
      - platform: state
        entity_id: input_boolean.manual_charging_mode
    mode: restart  # Restart if triggered while running
    action:
      - choose:
          # Priority 1: Emergency Charging (SOC < 20%)
          - conditions:
              - condition: state
                entity_id: binary_sensor.notladung_erforderlich
                state: "on"
              - condition: state
                entity_id: binary_sensor.auto_angeschlossen
                state: "on"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.charging_state
                data:
                  option: "emergency"
              - service: script.start_emergency_charging

          # Priority 2: Manual Mode
          - conditions:
              - condition: state
                entity_id: input_boolean.manual_charging_mode
                state: "on"
              - condition: state
                entity_id: binary_sensor.auto_angeschlossen
                state: "on"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.charging_state
                data:
                  option: "manual"
              - service: script.execute_manual_charging

          # Priority 3: PV Surplus Charging
          - conditions:
              - condition: state
                entity_id: input_boolean.enable_pv_charging
                state: "on"
              - condition: state
                entity_id: binary_sensor.auto_angeschlossen
                state: "on"
              - condition: template
                value_template: >
                  {% set surplus = states('sensor.verfugbarer_pv_uberschuss') | float(0) %}
                  {% set min_surplus = states('input_number.min_pv_surplus') | float(1400) %}
                  {% set already_pv = is_state('input_select.charging_state', 'pv') %}
                  {% set is_charging = is_state('sensor.garage_status', 'charging') %}
                  {# Stay in PV mode once started — smart script handles stopping via its
                     internal 300s stop timer. Only require surplus >= min_surplus to enter. #}
                  {{ surplus >= min_surplus or (already_pv and is_charging) }}
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.charging_state
                data:
                  option: "pv"
              # Do NOT call adjust_pv_charging_smart here — the dedicated
              # energy_mgmt_pv_charging_adjust automation runs every 2 minutes
              # and handles current adjustment. Calling it here too causes a
              # Easee API call every minute → power spikes on the Tibber meter.

          # Priority 4: Price-Based Charging (during scheduled hours)
          - conditions:
              - condition: state
                entity_id: input_boolean.enable_price_charging
                state: "on"
              - condition: state
                entity_id: binary_sensor.auto_angeschlossen
                state: "on"
              - condition: template
                value_template: "{{ state_attr('sensor.optimaler_ladeplan', 'should_charge_now') == true }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.charging_state
                data:
                  option: "price"
              - service: script.start_price_charging

        # Default: Set to idle and stop charging
        default:
          - service: input_select.select_option
            target:
              entity_id: input_select.charging_state
            data:
              option: "idle"
          - condition: state
            entity_id: sensor.garage_status
            state: "charging"
          - service: script.stop_charging

  # ============================================================================
  # PV SURPLUS CHARGING
  # ============================================================================

  - id: energy_mgmt_pv_charging_adjust
    alias: "Energie Management - PV Ladestrom anpassen"
    description: "Passt den Ladestrom alle 2 Minuten an den PV-Überschuss an mit Zeitstabilität"
    trigger:
      - platform: time_pattern
        minutes: "/2"  # Check every 2 minutes (not on every state change!)
    condition:
      - condition: state
        entity_id: input_select.charging_state
        state: "pv"
      - condition: state
        entity_id: binary_sensor.auto_angeschlossen
        state: "on"
    mode: single  # Don't restart - wait for completion
    action:
      - service: script.adjust_pv_charging_smart

  # ============================================================================
  # PRICE-BASED CHARGING
  # ============================================================================

  - id: energy_mgmt_calculate_optimal_hours
    alias: "Energie Management - Optimale Ladezeiten berechnen"
    description: "Berechnet die günstigsten Ladezeiten basierend auf Tibber-Preisen"
    trigger:
      - platform: homeassistant
        event: start
      - platform: time
        at: "13:00:00"  # When Tibber publishes next-day prices
      - platform: time
        at: "00:05:00"  # Refresh at midnight so today's prices are current
      - platform: state
        entity_id: sensor.tibber_electricity_price
      # Recalculate immediately when feature toggles or thresholds change
      - platform: state
        entity_id:
          - input_boolean.enable_price_charging
          - input_boolean.enable_morning_readiness
          - input_number.price_threshold_80
          - input_number.price_threshold_50
          - input_number.target_soc_morning
          - input_number.morning_target_hour
    action:
      - service: script.calculate_optimal_charging_hours

  - id: energy_mgmt_morning_readiness_check
    alias: "Energie Management - Morgen-Bereitschaft prüfen"
    description: "Prüft abends, ob das Morgenziel erreicht wird"
    trigger:
      - platform: time
        at: "22:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.enable_morning_readiness
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.morgenziel_erreichbar
                state: "off"
            sequence:
              - service: notify.mobile_app
                data:
                  title: "⚠️ Morgenziel gefährdet"
                  message: >
                    Das Fahrzeug wird morgen um {{ states('input_number.morning_target_hour') | int }}:00 Uhr wahrscheinlich nicht
                    {{ states('input_number.target_soc_morning') }}% erreichen.
                    Aktueller Ladestand: {{ states('sensor.aktives_auto_ladestand') }}% ({{ states('sensor.aktives_auto') }})
              - service: input_select.select_option
                target:
                  entity_id: input_select.charging_state
                data:
                  option: "morning_readiness"
              - service: script.start_emergency_morning_charge

  # ============================================================================
  # MANUAL CHARGING
  # ============================================================================

  - id: energy_mgmt_manual_charging_update
    alias: "Energie Management - Manuelle Ladung aktualisieren"
    description: "Aktualisiert den manuellen Ladeplan alle 15 Minuten"
    trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: state
        entity_id: input_boolean.manual_charging_mode
        to: "on"
      - platform: state
        entity_id: input_number.manual_target_soc
      - platform: state
        entity_id: input_datetime.manual_deadline
    condition:
      - condition: state
        entity_id: input_boolean.manual_charging_mode
        state: "on"
      - condition: state
        entity_id: input_select.charging_state
        state: "manual"
    action:
      - service: script.execute_manual_charging

  - id: energy_mgmt_manual_charging_complete
    alias: "Energie Management - Manuelle Ladung abgeschlossen"
    description: "Benachrichtigt, wenn das manuelle Ladeziel erreicht wurde"
    trigger:
      - platform: template
        value_template: >
          {{ states('sensor.aktives_auto_ladestand') | float >=
             states('input_number.manual_target_soc') | float }}
    condition:
      - condition: state
        entity_id: input_boolean.manual_charging_mode
        state: "on"
    action:
      - service: notify.mobile_app
        data:
          title: "✅ Ladeziel erreicht"
          message: >
            Das Fahrzeug hat {{ states('sensor.aktives_auto_ladestand') }}% erreicht.
            Manuelle Ladung abgeschlossen.
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.manual_charging_mode
      - service: script.stop_charging

  - id: energy_mgmt_manual_mode_disabled
    alias: "Energie Management - Manueller Modus deaktiviert"
    description: "Stoppt Ladung wenn manueller Modus ausgeschaltet wird"
    trigger:
      - platform: state
        entity_id: input_boolean.manual_charging_mode
        to: "off"
    condition:
      # Only stop if Easee is actually charging
      - condition: state
        entity_id: sensor.garage_status
        state: "charging"
    action:
      - service: script.stop_charging
      - service: input_select.select_option
        target:
          entity_id: input_select.charging_state
        data:
          option: "idle"

  # ============================================================================
  # NOTIFICATIONS
  # ============================================================================

  - id: energy_mgmt_charging_started
    alias: "Energie Management - Benachrichtigung Ladung gestartet"
    description: "Sendet Benachrichtigung beim Ladestart (Easee)"
    trigger:
      - platform: state
        entity_id: sensor.garage_status
        to: "charging"
    action:
      - service: notify.mobile_app
        data:
          title: "🔌 Ladung gestartet"
          message: >
            Modus: {{ states('sensor.aktueller_lademodus') }}
            Aktuell: {{ states('sensor.aktives_auto_ladestand') }}% ({{ states('sensor.aktives_auto') }})
            {% if is_state('input_select.charging_state', 'pv') %}
            PV-Überschuss: {{ states('sensor.verfugbarer_pv_uberschuss') }}W
            {% elif is_state('input_select.charging_state', 'price') %}
            Strompreis: {{ states('sensor.aktueller_strompreis') }} EUR/kWh
            {% endif %}

  - id: energy_mgmt_charging_completed
    alias: "Energie Management - Benachrichtigung Ladung abgeschlossen"
    description: "Sendet Benachrichtigung beim Ladeende (Easee)"
    trigger:
      - platform: state
        entity_id: sensor.garage_status
        to: "completed"
    action:
      - service: notify.mobile_app
        data:
          title: "✅ Ladung abgeschlossen"
          message: >
            Ladestand: {{ states('sensor.aktives_auto_ladestand') }}% ({{ states('sensor.aktives_auto') }})
            Modus: {{ states('sensor.aktueller_lademodus') }}
            Energie geladen: {{ states('sensor.garage_session_energy') }} kWh

  - id: energy_mgmt_emergency_charging_alert
    alias: "Energie Management - Notladung Warnung"
    description: "Warnt bei kritisch niedrigem Ladestand"
    trigger:
      - platform: numeric_state
        entity_id: sensor.aktives_auto_ladestand
        below: 20
    condition:
      - condition: state
        entity_id: binary_sensor.auto_angeschlossen
        state: "on"
      # Only notify if not already in emergency mode
      - condition: not
        conditions:
          - condition: state
            entity_id: input_select.charging_state
            state: "emergency"
    action:
      - service: notify.mobile_app
        data:
          title: "⚠️ Notladung aktiviert"
          message: >
            Kritischer Ladestand: {{ states('sensor.aktives_auto_ladestand') }}% ({{ states('sensor.aktives_auto') }})
            Notladung wurde gestartet.
          data:
            priority: high

  # ============================================================================
  # SAFETY & ERROR HANDLING
  # ============================================================================

  - id: energy_mgmt_car_disconnected
    alias: "Energie Management - Auto getrennt"
    description: "Stoppt Ladung, wenn Auto getrennt wird (Easee)"
    trigger:
      - platform: state
        entity_id: sensor.garage_status
        to: "disconnected"
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.charging_state
        data:
          option: "idle"
      - condition: state
        entity_id: input_boolean.manual_charging_mode
        state: "on"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.manual_charging_mode

  - id: energy_mgmt_car_connected
    alias: "Energie Management - Auto angeschlossen"
    description: "Verhindert automatisches Laden beim Anschließen (Easee)"
    trigger:
      # Trigger when Easee goes to "ready" or "charging"
      - platform: state
        entity_id: sensor.garage_status
        to: "ready"
      - platform: state
        entity_id: sensor.garage_status
        to: "charging"
    condition:
      # Only proceed if we're in idle state (not in an active charging mode)
      - condition: state
        entity_id: input_select.charging_state
        state: "idle"
    mode: restart
    action:
      # Immediately pause the Easee charger to prevent auto-start
      - service: easee.action_command
        data:
          device_id: 4997305f9b10ff58595e095f3bdf74cd
          action_command: "pause"
      # Wait briefly and send pause again to ensure it worked
      - delay:
          milliseconds: 500
      - service: easee.action_command
        data:
          device_id: 4997305f9b10ff58595e095f3bdf74cd
          action_command: "pause"

  - id: energy_mgmt_integration_error
    alias: "Energie Management - Integrationsfehler"
    description: "Benachrichtigt bei Integrationsproblemen"
    trigger:
      - platform: state
        entity_id:
          - sensor.model_3_state_of_charge
          - sensor.tibber_electricity_price
          - sensor.garage_status
        to: "unavailable"
        for:
          minutes: 10
    action:
      - service: notify.mobile_app
        data:
          title: "⚠️ Integration nicht verfügbar"
          message: >
            {{ trigger.to_state.attributes.friendly_name }} ist seit 10 Minuten nicht verfügbar.
            Energie-Management könnte beeinträchtigt sein.

  # ============================================================================
  # TIBBER REALTIME POWER WATCHDOG
  # Tibber's realtime WebSocket stream occasionally freezes (sensors go stale).
  # When tibber_power has not changed for 15 minutes during daytime, reload
  # the Tibber integration to force a reconnect.
  # ============================================================================
  - id: tibber_realtime_watchdog
    alias: "Tibber - Realtime Power Watchdog"
    description: "Reloads Tibber integration when realtime power sensors freeze"
    trigger:
      - platform: state
        entity_id: sensor.tibber_power
        to:
        for:
          minutes: 15
    condition:
      # Only act during hours when realtime data matters (6:00–23:00)
      - condition: time
        after: "06:00:00"
        before: "23:00:00"
    action:
      - service: system_log.write
        data:
          message: >
            Tibber realtime power sensor frozen for 15 min (state: {{ states('sensor.tibber_power') }}).
            Reloading Tibber integration.
          level: warning
      - service: homeassistant.reload_config_entry
        target:
          entity_id: sensor.tibber_power
      - delay:
          seconds: 10
      - service: notify.mobile_app
        data:
          title: "⚠️ Tibber Echtzeit-Daten eingefroren"
          message: >
            Tibber Leistungssensor war 15 Min. eingefroren.
            Integration wurde automatisch neu geladen.
    mode: single
