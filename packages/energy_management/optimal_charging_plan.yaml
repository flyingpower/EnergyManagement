# Optimal Charging Plan Calculator
# Calculates the cheapest hours to charge to meet morning target
# Event-triggered so it receives raw price data directly (not string-serialized attributes)

template:
  - trigger:
      - platform: event
        event_type: tibber_prices_updated
    sensor:
      - name: "Optimaler Ladeplan"
        unique_id: optimal_charging_plan
        state: "{{ now().isoformat() }}"
        attributes:
          charging_plan: >
            {% set prices_dict = trigger.event.data.prices %}
            {% set home_key = prices_dict.keys() | list | first %}
            {% set raw_prices = prices_dict[home_key] %}

            {# Aggregate 15-min slots into hourly entries (first slot per hour) #}
            {% set ns = namespace(hourly=[], seen=[]) %}
            {% for p in raw_prices %}
              {% set dt = p.start_time | as_datetime | as_local %}
              {% set hkey = dt.strftime('%Y-%m-%dT%H') %}
              {% if hkey not in ns.seen %}
                {% set ns.seen = ns.seen + [hkey] %}
                {% set ns.hourly = ns.hourly + [{
                  'time': dt.replace(minute=0, second=0, microsecond=0),
                  'price': p.price | float
                }] %}
              {% endif %}
            {% endfor %}
            {% set prices = ns.hourly %}

            {% set current_soc = states('sensor.tesla_ladestand') | float(0) %}
            {% set target_soc = states('input_number.target_soc_morning') | float(80) %}
            {% set threshold_80 = states('input_number.price_threshold_80') | float(0.28) %}
            {% set threshold_50 = states('input_number.price_threshold_50') | float(0.30) %}
            {% set charging_power = 11.04 %}
            {% set battery_capacity = 75 %}
            {% set soc_per_hour = (charging_power / battery_capacity * 100) | round(1) %}
            {% set now_time = now() %}
            {% set target_hour = states('input_number.morning_target_hour') | int(7) %}
            {% set target_time = now_time.replace(hour=target_hour, minute=0, second=0, microsecond=0) %}
            {% if now_time.hour >= target_hour %}
              {% set target_time = target_time + timedelta(days=1) %}
            {% endif %}

            {# Build list of available hours until morning target #}
            {% set avail = namespace(list=[]) %}
            {% for p in prices %}
              {% if p.time >= now_time.replace(minute=0, second=0, microsecond=0) and p.time < target_time %}
                {% set avail.list = avail.list + [p] %}
              {% endif %}
            {% endfor %}

            {# Calculate hours needed #}
            {% set soc_deficit = target_soc - current_soc %}
            {% set hours_needed = (soc_deficit / soc_per_hour) | round(0, 'ceil') | int %}
            {% set hours_needed = [hours_needed, 0] | max %}
            {% set hours_needed = [hours_needed, avail.list | length] | min %}

            {# Select cheapest N hours by datetime string key #}
            {% set sorted_hours = avail.list | sort(attribute='price') %}
            {% set selected_datetimes = sorted_hours[:hours_needed] | map(attribute='time') | map('string') | list %}

            {# Build plan #}
            {% set plan = namespace(list=[]) %}
            {% set soc = namespace(value=current_soc) %}
            {% for p in prices %}
              {% set price_time = p.time %}
              {% set should_charge = false %}
              {% set charge_reason = 'none' %}
              {% if price_time >= now_time.replace(minute=0, second=0, microsecond=0) %}
                {% if p.price <= threshold_80 and soc.value | round(0) < 80 %}
                  {% set should_charge = true %}
                  {% set charge_reason = 'price_80' %}
                {% elif p.price <= threshold_50 and soc.value | round(0) < 50 %}
                  {% set should_charge = true %}
                  {% set charge_reason = 'price_50' %}
                {% elif price_time | string in selected_datetimes and price_time < target_time and soc.value | round(0) < target_soc %}
                  {% set should_charge = true %}
                  {% set charge_reason = 'morning_target' %}
                {% endif %}
              {% endif %}
              {% if should_charge %}
                {% set soc.value = [soc.value + soc_per_hour, 100] | min %}
              {% endif %}
              {% set plan.list = plan.list + [{
                'hour': price_time.hour,
                'time': price_time.strftime('%H:%M'),
                'datetime': price_time.isoformat(),
                'price': p.price,
                'should_charge': should_charge,
                'charge_reason': charge_reason,
                'soc_end': soc.value | round(0)
              }] %}
            {% endfor %}
            {{ plan.list }}

          hours_needed: >
            {% set current_soc = states('sensor.tesla_ladestand') | float(0) %}
            {% set target_soc = states('input_number.target_soc_morning') | float(80) %}
            {% set soc_per_hour = (11.04 / 75 * 100) %}
            {% set soc_deficit = target_soc - current_soc %}
            {{ [(soc_deficit / soc_per_hour) | round(0, 'ceil') | int, 0] | max }}

          should_charge_now: >
            {% set prices_dict = trigger.event.data.prices %}
            {% set home_key = prices_dict.keys() | list | first %}
            {% set raw_prices = prices_dict[home_key] %}
            {% set ns = namespace(hourly=[], seen=[]) %}
            {% for p in raw_prices %}
              {% set dt = p.start_time | as_datetime | as_local %}
              {% set hkey = dt.strftime('%Y-%m-%dT%H') %}
              {% if hkey not in ns.seen %}
                {% set ns.seen = ns.seen + [hkey] %}
                {% set ns.hourly = ns.hourly + [{'time': dt.replace(minute=0, second=0, microsecond=0), 'price': p.price | float}] %}
              {% endif %}
            {% endfor %}
            {% set prices = ns.hourly %}
            {% set current_soc = states('sensor.tesla_ladestand') | float(0) %}
            {% set target_soc = states('input_number.target_soc_morning') | float(80) %}
            {% set threshold_80 = states('input_number.price_threshold_80') | float(0.28) %}
            {% set threshold_50 = states('input_number.price_threshold_50') | float(0.30) %}
            {% set soc_per_hour = (11.04 / 75 * 100) | round(1) %}
            {% set now_time = now() %}
            {% set current_hour_start = now_time.replace(minute=0, second=0, microsecond=0) %}
            {% set target_hour = states('input_number.morning_target_hour') | int(7) %}
            {% set target_time = now_time.replace(hour=target_hour, minute=0, second=0, microsecond=0) %}
            {% if now_time.hour >= target_hour %}
              {% set target_time = target_time + timedelta(days=1) %}
            {% endif %}
            {% set avail = namespace(list=[]) %}
            {% for p in prices %}
              {% if p.time >= current_hour_start and p.time < target_time %}
                {% set avail.list = avail.list + [p] %}
              {% endif %}
            {% endfor %}
            {% set soc_deficit = target_soc - current_soc %}
            {% set hours_needed = [(soc_deficit / soc_per_hour) | round(0, 'ceil') | int, 0] | max %}
            {% set hours_needed = [hours_needed, avail.list | length] | min %}
            {% set sorted_hours = avail.list | sort(attribute='price') %}
            {% set selected_datetimes = sorted_hours[:hours_needed] | map(attribute='time') | map('string') | list %}
            {% set soc = namespace(value=current_soc) %}
            {% set result = namespace(value=false) %}
            {% for p in prices %}
              {% set price_time = p.time %}
              {% set should_charge = false %}
              {% if price_time >= current_hour_start %}
                {% if p.price <= threshold_80 and soc.value | round(0) < 80 %}
                  {% set should_charge = true %}
                {% elif p.price <= threshold_50 and soc.value | round(0) < 50 %}
                  {% set should_charge = true %}
                {% elif price_time | string in selected_datetimes and price_time < target_time and soc.value | round(0) < target_soc %}
                  {% set should_charge = true %}
                {% endif %}
                {% if should_charge %}
                  {% set soc.value = [soc.value + soc_per_hour, 100] | min %}
                {% endif %}
                {% if price_time == current_hour_start %}
                  {% set result.value = should_charge %}
                  {% break %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ result.value }}

          next_charging_hour: >
            {% set prices_dict = trigger.event.data.prices %}
            {% set home_key = prices_dict.keys() | list | first %}
            {% set raw_prices = prices_dict[home_key] %}
            {% set ns = namespace(hourly=[], seen=[]) %}
            {% for p in raw_prices %}
              {% set dt = p.start_time | as_datetime | as_local %}
              {% set hkey = dt.strftime('%Y-%m-%dT%H') %}
              {% if hkey not in ns.seen %}
                {% set ns.seen = ns.seen + [hkey] %}
                {% set ns.hourly = ns.hourly + [{'time': dt.replace(minute=0, second=0, microsecond=0), 'price': p.price | float}] %}
              {% endif %}
            {% endfor %}
            {% set prices = ns.hourly %}
            {% set current_soc = states('sensor.tesla_ladestand') | float(0) %}
            {% set target_soc = states('input_number.target_soc_morning') | float(80) %}
            {% set threshold_80 = states('input_number.price_threshold_80') | float(0.28) %}
            {% set threshold_50 = states('input_number.price_threshold_50') | float(0.30) %}
            {% set soc_per_hour = (11.04 / 75 * 100) | round(1) %}
            {% set now_time = now() %}
            {% set target_hour = states('input_number.morning_target_hour') | int(7) %}
            {% set target_time = now_time.replace(hour=target_hour, minute=0, second=0, microsecond=0) %}
            {% if now_time.hour >= target_hour %}
              {% set target_time = target_time + timedelta(days=1) %}
            {% endif %}
            {% set avail = namespace(list=[]) %}
            {% for p in prices %}
              {% if p.time >= now_time.replace(minute=0, second=0, microsecond=0) and p.time < target_time %}
                {% set avail.list = avail.list + [p] %}
              {% endif %}
            {% endfor %}
            {% set soc_deficit = target_soc - current_soc %}
            {% set hours_needed = [(soc_deficit / soc_per_hour) | round(0, 'ceil') | int, 0] | max %}
            {% set hours_needed = [hours_needed, avail.list | length] | min %}
            {% set sorted_hours = avail.list | sort(attribute='price') %}
            {% set selected_datetimes = sorted_hours[:hours_needed] | map(attribute='time') | map('string') | list %}
            {% set soc = namespace(value=current_soc) %}
            {% set result = namespace(value='') %}
            {% for p in prices %}
              {% set price_time = p.time %}
              {% set should_charge = false %}
              {% if price_time >= now_time.replace(minute=0, second=0, microsecond=0) %}
                {% if p.price <= threshold_80 and soc.value | round(0) < 80 %}
                  {% set should_charge = true %}
                {% elif p.price <= threshold_50 and soc.value | round(0) < 50 %}
                  {% set should_charge = true %}
                {% elif price_time | string in selected_datetimes and price_time < target_time and soc.value | round(0) < target_soc %}
                  {% set should_charge = true %}
                {% endif %}
                {% if should_charge %}
                  {% set soc.value = [soc.value + soc_per_hour, 100] | min %}
                  {% if price_time > now_time and result.value == '' %}
                    {% set result.value = price_time.strftime('%H:%M') %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ result.value }}
