views:
  - title: Energie Management
    path: energie-management
    icon: mdi:car-electric
    badges: []
    cards:
      # ============================================================================
      # STATUS OVERVIEW
      # ============================================================================
      - type: vertical-stack
        title: Status Übersicht
        cards:
          - type: entities
            entities:
              - entity: sensor.aktueller_lademodus
                name: Aktueller Modus
                icon: mdi:state-machine
              - entity: sensor.aktives_auto
                name: Aktives Auto
                icon: mdi:car-electric
              - entity: input_select.charging_state
                name: Systemstatus
              - entity: binary_sensor.auto_angeschlossen
                name: Auto verbunden

          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.aktives_auto_ladestand
                name: Aktives Auto SoC
                min: 0
                max: 100
                severity:
                  green: 60
                  yellow: 40
                  red: 20
              - type: gauge
                entity: sensor.tesla_ladestand
                name: Tesla
                min: 0
                max: 100
                severity:
                  green: 60
                  yellow: 40
                  red: 20
              - type: gauge
                entity: sensor.kia_ladestand
                name: Kia EV3
                min: 0
                max: 100
                severity:
                  green: 60
                  yellow: 40
                  red: 20

          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.aktueller_strompreis
                name: Strompreis
                min: 0
                max: 0.50
                severity:
                  green: 0
                  yellow: 0.30
                  red: 0.40
                unit: EUR/kWh
              - type: gauge
                entity: sensor.verfugbarer_pv_uberschuss
                name: PV-Überschuss
                min: 0
                max: 3000
                severity:
                  green: 1400
                  yellow: 1000
                  red: 0
                unit: W

          - type: entities
            entities:
              - entity: sensor.tesla_ladestatus
                name: Tesla Status
              - entity: sensor.kia_ladestatus
                name: Kia Status
              - entity: sensor.easee_ladegerat_status
                name: Ladegerät Status
              - entity: sensor.aktuelle_ladeleistung
                name: Aktuelle Leistung
              - entity: sensor.net_grid_consumption
                name: Netz-Bilanz (W)
              - entity: sensor.pv_target_charging_current
                name: Ziel-Ladestrom PV
              - entity: sensor.preisniveau
                name: Aktuelles Preisniveau

      # ============================================================================
      # CHARGING CONTROLS
      # ============================================================================
      - type: vertical-stack
        title: Ladesteuerung
        cards:
          - type: entities
            title: Manueller Lademodus
            entities:
              - entity: input_boolean.manual_charging_mode
                name: Manuellen Modus aktivieren

          - type: conditional
            conditions:
              - entity: input_boolean.manual_charging_mode
                state: "on"
            card:
              type: entities
              entities:
                - entity: input_number.manual_target_soc
                  name: Ziel-Ladestand
                - entity: input_datetime.manual_deadline
                  name: Deadline
                - entity: sensor.benotigte_energie_bis_ziel
                  name: Benötigte Energie
                - entity: sensor.geschatzte_ladedauer
                  name: Geschätzte Dauer

          - type: entities
            title: Phasen & Strom Überschreiben
            entities:
              - entity: input_select.override_phase_mode
                name: Phasenmodus (auto = vom Modus)
              - entity: input_number.override_charging_current
                name: Ladestrom (0 = automatisch)

          - type: entities
            title: Schnellaktionen
            entities:
              - entity: script.adjust_pv_charging_smart
                name: PV-Ladung jetzt anpassen
                icon: mdi:solar-power
              - entity: script.start_emergency_charging
                name: Notladung starten
                icon: mdi:alert-circle
              - entity: script.stop_charging
                name: Ladung stoppen
                icon: mdi:stop-circle
              - entity: script.restore_defaults
                name: Standardwerte wiederherstellen
                icon: mdi:restore

      # ============================================================================
      # SETTINGS
      # ============================================================================
      - type: vertical-stack
        title: Einstellungen
        cards:
          - type: entities
            title: Aktivierte Funktionen
            entities:
              - entity: input_boolean.enable_pv_charging
                name: PV-Laden
              - entity: input_boolean.enable_price_charging
                name: Preisbasiertes Laden
              - entity: input_boolean.enable_morning_readiness
                name: Morgen-Bereitschaft

          - type: entities
            title: Morgen-Bereitschaft
            entities:
              - entity: input_number.target_soc_morning
                name: Ziel-Ladestand
              - entity: input_number.morning_target_hour
                name: Zielzeit
              - entity: sensor.benotigte_energie_bis_ziel
                name: Benötigte Energie
              - entity: binary_sensor.morgenziel_erreichbar
                name: Ziel erreichbar

          - type: entities
            title: Preisschwellen
            entities:
              - entity: input_number.price_threshold_80
                name: Schwelle für 80% Ladung
              - entity: input_number.price_threshold_50
                name: Schwelle für 50% Ladung
              - entity: sensor.aktueller_strompreis
                name: Aktueller Preis

          - type: entities
            title: PV-Laden Einstellungen
            entities:
              - entity: input_number.min_pv_surplus
                name: Minimaler Überschuss zum Starten
              - entity: input_number.pv_charging_buffer
                name: Sicherheitspuffer (W)
              - entity: sensor.verfugbarer_pv_uberschuss
                name: Aktueller Überschuss

      # ============================================================================
      # CHARGING PLAN & FORECAST
      # ============================================================================
      - type: vertical-stack
        title: Ladeplan & Preisprognose
        cards:
          - type: markdown
            title: Aktueller Status
            content: >
              {% set next_hour = state_attr('sensor.optimaler_ladeplan', 'next_charging_hour') %}
              {% set hours_needed = state_attr('sensor.optimaler_ladeplan', 'hours_needed') %}
              {% set should_charge = state_attr('sensor.optimaler_ladeplan', 'should_charge_now') %}

              **Laden jetzt:** {% if should_charge == true or should_charge == 'True' %}🟢 Ja{% else %}⚪ Nein{% endif %}

              **Nächste Ladung:** {{ next_hour if next_hour else 'Nicht geplant' }}

              **Benötigte Stunden:** {{ hours_needed if hours_needed is not none else 0 }} h bis Morgenziel

              **Sonnenstunden heute:** {{ states('sensor.sonnenstunden_prognose') }} h

              **PV-Prognose (6h):** {{ states('sensor.pv_prognose_nachste_stunden') }} kWh

          - type: custom:html-template-card
            title: Optimaler Ladeplan
            ignore_line_breaks: true
            content: >
              {% set plan = state_attr('sensor.optimaler_ladeplan', 'charging_plan') %}
              {% set solar_forecast = state_attr('sensor.solar_prognose_stundlich', 'hourly_forecast') %}
              {% if plan is none or plan | length == 0 %}
              <p><b>Keine Daten verfügbar</b> — Tibber-Preise werden täglich um 13:00 Uhr aktualisiert.</p>
              {% else %}
              {% set now_time = now() %}
              {% set now_hour = now_time.replace(minute=0, second=0, microsecond=0) %}
              <style>
                .ladeplan { width:100%; border-collapse:collapse; font-size:0.9em; }
                .ladeplan th { text-align:left; padding:4px 8px; border-bottom:2px solid var(--divider-color); color:var(--secondary-text-color); font-weight:500; }
                .ladeplan td { padding:4px 8px; border-bottom:1px solid var(--divider-color); }
                .ladeplan tr.charging { background:rgba(76,175,80,0.12); }
                .ladeplan tr.current { font-weight:bold; }
                .ladeplan .price-cheap { color:#4caf50; font-weight:500; }
                .ladeplan .price-ok { color:#ff9800; }
                .ladeplan .price-exp { color:#f44336; }
                .legend { font-size:0.8em; color:var(--secondary-text-color); margin-top:8px; }
              </style>
              <table class="ladeplan">
              <tr><th>Zeit</th><th>Preis</th><th>Laden</th><th>SoC</th><th>PV</th><th>Grund</th></tr>
              {% for hour in plan %}
              {%- set hour_time = hour.datetime | as_datetime %}
              {%- if hour_time >= now_hour %}
              {%- set pv = namespace(v=0) %}
              {%- if solar_forecast is not none and solar_forecast is iterable %}
              {%- for s in solar_forecast %}{%- if s.hour == hour.hour %}{%- set pv.v = s.kw %}{%- endif %}{%- endfor %}
              {%- endif %}
              {%- set is_current = hour_time == now_hour %}
              {%- set row_class = ('charging ' if hour.should_charge else '') + ('current' if is_current else '') %}
              {%- set price_class = 'price-cheap' if hour.price <= states('input_number.price_threshold_80') | float(0.28) else 'price-ok' if hour.price <= states('input_number.price_threshold_50') | float(0.30) else 'price-exp' %}
              {%- set icon = '🟢' if hour.should_charge else '⚪' %}
              {%- set reason = 'Sehr günstig' if hour.charge_reason == 'price_80' else 'Günstig' if hour.charge_reason == 'price_50' else 'Morgenziel' if hour.charge_reason == 'morning_target' else '' %}
              <tr class="{{ row_class }}"><td>{{ hour.time }}</td><td class="{{ price_class }}">{{ hour.price | round(3) }}€</td><td>{{ icon }}</td><td>{{ hour.soc_end }}%</td><td>{{ pv.v | round(1) }}kW</td><td>{{ reason }}</td></tr>
              {%- endif %}
              {% endfor %}
              </table>
              <div class="legend">🟢 Ladung geplant &nbsp;·&nbsp; ⚪ keine Ladung &nbsp;·&nbsp; <span class="price-cheap">■</span> ≤{{ states('input_number.price_threshold_80') }}€ &nbsp;·&nbsp; <span class="price-ok">■</span> ≤{{ states('input_number.price_threshold_50') }}€ &nbsp;·&nbsp; <span class="price-exp">■</span> teuer</div>
              {% endif %}

          - type: entities
            title: Prognose-Status
            entities:
              - entity: sensor.aktives_auto_ladestand
                name: Aktueller Ladestand
              - entity: sensor.aktueller_strompreis
                name: Aktueller Preis
              - entity: input_number.price_threshold_80
                name: Preisschwelle
              - entity: input_number.target_soc_morning
                name: Ziel-Ladestand
              - entity: sensor.benotigte_energie_bis_ziel
                name: Benötigte Energie
              - entity: sensor.geschatzte_ladedauer
                name: Geschätzte Ladedauer
              - entity: script.refresh_tibber_prices
                name: Tibber-Preise jetzt laden
                icon: mdi:refresh

      # ============================================================================
      # HISTORY
      # ============================================================================
      - type: vertical-stack
        title: Verlauf
        cards:
          - type: history-graph
            title: Ladestand Verlauf (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.tesla_ladestand
                name: Tesla
              - entity: sensor.kia_ladestand
                name: Kia EV3
          - type: history-graph
            title: Ladeleistung & Netz-Bilanz (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.aktuelle_ladeleistung
              - entity: sensor.net_grid_consumption
          - type: history-graph
            title: Strompreis Verlauf (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.aktueller_strompreis
          - type: history-graph
            title: PV-Überschuss Verlauf (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.verfugbarer_pv_uberschuss
          - type: history-graph
            title: Lademodus Verlauf (24h)
            hours_to_show: 24
            entities:
              - entity: input_select.charging_state

      # ============================================================================
      # DETAILED STATUS
      # ============================================================================
      - type: vertical-stack
        title: Detaillierter Status
        cards:
          - type: entities
            title: Aktives Auto
            entities:
              - entity: sensor.aktives_auto
                name: Erkanntes Auto
                icon: mdi:car-electric
              - entity: sensor.aktives_auto_ladestand
                name: SoC (aktiv)

          - type: entities
            title: Tesla Model 3
            entities:
              - entity: sensor.tesla_ladestand
                name: Ladestand
              - entity: sensor.tesla_ladestatus
                name: Status
              - entity: sensor.model_3_battery_level
                name: Batterie (Original)
              - entity: sensor.model_3_charging
                name: Ladezustand (Original)

          - type: entities
            title: Kia EV3
            entities:
              - entity: sensor.kia_ladestand
                name: Ladestand
              - entity: sensor.kia_ladestatus
                name: Status
              - entity: sensor.ev3_ev_battery_level
                name: Batterie (Original)
              - entity: binary_sensor.ev3_ev_battery_plug
                name: Stecker (Original)
              - entity: binary_sensor.ev3_ev_battery_charge
                name: Ladezustand (Original)

          - type: entities
            title: Easee Ladegerät
            entities:
              - entity: sensor.easee_ladegerat_status
                name: Status
              - entity: sensor.aktuelle_ladeleistung
                name: Leistung
              - entity: sensor.garage_power
                name: Leistung (Original kW)
              - entity: sensor.garage_status
                name: Status (Original)
              - entity: sensor.garage_session_energy
                name: Geladene Energie (kWh)

          - type: entities
            title: Tibber Energie
            entities:
              - entity: sensor.aktueller_strompreis
                name: Aktueller Preis
              - entity: sensor.preisniveau
                name: Preisniveau
              - entity: sensor.tibber_power
                name: Verbrauch (W)
              - entity: sensor.tibber_power_production
                name: Produktion (W)
              - entity: sensor.net_grid_consumption
                name: Netz-Bilanz (W)
              - entity: sensor.tibber_electricity_price
                name: Preis (Original)

      # ============================================================================
      # ALERTS
      # ============================================================================
      - type: conditional
        conditions:
          - entity: binary_sensor.notladung_erforderlich
            state: "on"
        card:
          type: markdown
          content: |
            ## ⚠️ Notladung erforderlich!

            Der Ladestand ist kritisch niedrig ({{ states('sensor.aktives_auto_ladestand') }}%, {{ states('sensor.aktives_auto') }}).
            Das System hat automatisch die Notladung aktiviert.

      - type: conditional
        conditions:
          - entity: binary_sensor.morgenziel_erreichbar
            state: "off"
        card:
          type: markdown
          content: |
            ## ⚠️ Morgenziel gefährdet

            Das Fahrzeug wird morgen um {{ states('input_number.morning_target_hour') | int }}:00 Uhr wahrscheinlich nicht
            {{ states('input_number.target_soc_morning') }}% erreichen.

            Aktives Auto: {{ states('sensor.aktives_auto') }}
            Aktueller Ladestand: {{ states('sensor.aktives_auto_ladestand') }}%
            Geschätzte Ladedauer: {{ states('sensor.geschatzte_ladedauer') }} Stunden
