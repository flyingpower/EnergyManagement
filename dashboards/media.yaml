            {
              "type": "markdown",
              "title": "Fridge Cam",
              "content": "<div id=\"fridge-cam-container\" style=\"position: relative; width: 100%; max-width: 800px; margin: 0 auto; user-select: none;\">\n  <img id=\"fridge-cam-image\" src=\"http://192.168.0.27/images/image0.jpg\" style=\"width: 100%; height: auto; display: block; border-radius: 8px;\" />\n  <div style=\"text-align: center; margin-top: 16px; font-size: 18px; color: var(--primary-text-color);\">\n    <span id=\"fridge-cam-counter\">1 / 3</span>\n  </div>\n  <div style=\"text-align: center; margin-top: 8px; color: var(--secondary-text-color); font-size: 12px;\">\n    ← → arrows or swipe to navigate\n  </div>\n</div>\n\n<script>\n(function() {\n  const images = [\n    'http://192.168.0.27/images/image0.jpg',\n    'http://192.168.0.27/images/image1.jpg',\n    'http://192.168.0.27/images/image2.jpg'\n  ];\n  let currentIndex = 0;\n  let touchStartX = 0;\n  let touchEndX = 0;\n  \n  const imgElement = document.getElementById('fridge-cam-image');\n  const counter = document.getElementById('fridge-cam-counter');\n  const container = document.getElementById('fridge-cam-container');\n  \n  function updateImage() {\n    // Add timestamp to prevent caching\n    const timestamp = new Date().getTime();\n    imgElement.src = images[currentIndex] + '?t=' + timestamp;\n    counter.textContent = (currentIndex + 1) + ' / ' + images.length;\n  }\n  \n  function nextImage() {\n    currentIndex = (currentIndex + 1) % images.length;\n    updateImage();\n  }\n  \n  function prevImage() {\n    currentIndex = (currentIndex - 1 + images.length) % images.length;\n    updateImage();\n  }\n  \n  // Keyboard navigation\n  document.addEventListener('keydown', function(e) {\n    if (e.key === 'ArrowRight') {\n      nextImage();\n    } else if (e.key === 'ArrowLeft') {\n      prevImage();\n    }\n  });\n  \n  // Touch/swipe navigation\n  container.addEventListener('touchstart', function(e) {\n    touchStartX = e.changedTouches[0].screenX;\n  }, false);\n  \n  container.addEventListener('touchend', function(e) {\n    touchEndX = e.changedTouches[0].screenX;\n    handleSwipe();\n  }, false);\n  \n  function handleSwipe() {\n    if (touchEndX < touchStartX - 50) {\n      nextImage();\n    }\n    if (touchEndX > touchStartX + 50) {\n      prevImage();\n    }\n  }\n  \n  // Click to advance\n  imgElement.addEventListener('click', function() {\n    nextImage();\n  });\n  \n  // Refresh image every 30 seconds to ensure fresh content\n  setInterval(function() {\n    updateImage();\n  }, 30000);\n  \n  // Initial load with cache busting\n  updateImage();\n})();\n</script>"
            }
          ]
        }
      ]
    }
  }
}
