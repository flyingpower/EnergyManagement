            {
              "type": "conditional",
              "conditions": [
                {
                  "entity": "binary_sensor.notladung_erforderlich",
                  "state": "on"
                }
              ],
              "card": {
                "type": "markdown",
                "content": "## ⚠️ Notladung erforderlich!\n\nDer Ladestand ist kritisch niedrig ({{ states('sensor.tesla_ladestand') }}%).\nDas System hat automatisch die Notladung aktiviert.\n"
              }
            },
            {
              "type": "conditional",
              "conditions": [
                {
                  "entity": "binary_sensor.morgenziel_erreichbar",
                  "state": "off"
                }
              ],
              "card": {
                "type": "markdown",
                "content": "## ⚠️ Morgenziel gefährdet\n\nDas Fahrzeug wird morgen um {{ states('input_number.morning_target_hour') | int }}:00 Uhr wahrscheinlich nicht\n{{ states('input_number.target_soc_morning') }}% erreichen.\n\nAktueller Ladestand: {{ states('sensor.tesla_ladestand') }}%\nGeschätzte Ladedauer: {{ states('sensor.geschatzte_ladedauer') }} Stunden\n"
              }
            },
            {
              "type": "vertical-stack",
              "title": "Ladeplan & Preisprognose",
              "cards": [
                {
                  "type": "markdown",
                  "title": "Nächstes Ladefenster",
                  "content": "{% set next_hour = state_attr('sensor.optimaler_ladeplan', 'next_charging_hour') %}\n{% set hours_needed = state_attr('sensor.optimaler_ladeplan', 'hours_needed') %}\n{% set should_charge = state_attr('sensor.optimaler_ladeplan', 'should_charge_now') %}\n\n**Status:** {% if should_charge == true or should_charge == 'True' %}🟢 Lädt jetzt{% else %}⚪ Wartet{% endif %}\n\n**Nächste Ladung:** {{ next_hour if next_hour else 'Nicht geplant' }}\n\n**Benötigte Stunden:** {{ hours_needed if hours_needed else 0 }} h bis Morgenziel\n\n**Sonnenstunden heute:** {{ states('sensor.sonnenstunden_prognose') }} h\n\n**PV-Prognose (6h):** {{ states('sensor.pv_prognose_nachste_stunden') }} kWh\n"
                },
                {
                  "type": "markdown",
                  "title": "Optimaler Ladeplan (bis Prognoseende)",
                  "content": "{% set plan = state_attr('sensor.optimaler_ladeplan', 'charging_plan') -%}\n{% set solar_forecast = state_attr('sensor.solar_prognose_stundlich', 'hourly_forecast') -%}\n{% if plan is none or plan | length == 0 -%}\n**Keine Daten verfügbar**\n\nBitte \"Preisprognose aktualisieren\" ausführen um Tibber-Preise zu laden.\n{%- else -%}\n{% set now_time = now() -%}\n{% set target_time = states('input_number.target_soc_morning') | float(80) -%}\n\n| Zeit | Preis | Laden | SoC | PV | Grund |\n|------|-------|-------|-----|-----|-------|\n{%- for hour in plan -%}\n{%- set hour_time = hour.datetime | as_datetime -%}\n{%- if hour_time >= now_time.replace(minute=0, second=0, microsecond=0) -%}\n{%- set pv_production = namespace(value=0) -%}\n{%- if solar_forecast is not none and solar_forecast is iterable -%}\n{%- for solar in solar_forecast -%}\n{%- if solar.hour == hour.hour -%}\n{%- set pv_production.value = solar.kw -%}\n{%- endif -%}\n{%- endfor -%}\n{%- endif -%}\n{%- set charge_icon = '🟢' if hour.should_charge else '⚪' -%}\n{%- set reason = 'Sehr günstig' if hour.charge_reason == 'price_80' else 'Günstig' if hour.charge_reason == 'price_50' else 'Morgenziel' if hour.charge_reason == 'morning_target' else '-' %}\n| {{ hour.time }} | {{ hour.price | round(3) }} € | {{ charge_icon }} | {{ hour.soc_end }}% | {{ pv_production.value | round(1) }} kW | {{ reason }} |\n{%- endif -%}\n{%- endfor %}\n\n**Legende:**\n- 🟢 = Ladung geplant\n- ⚪ = Keine Ladung  \n- SoC = Erwarteter Ladestand am Ende der Stunde\n- PV = Solarprognose für diese Stunde\n- Grund: Sehr günstig (≤{{ states('input_number.price_threshold_80') }}€), Günstig (≤{{ states('input_number.price_threshold_50') }}€), Morgenziel ({{ target_time }}% bis {{ states('input_number.morning_target_hour') | int }}:00)\n{%- endif %}\n"
                },
